<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Rehber Başvurusu</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: white; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .form-container { background-color: #2c2f33; padding: 30px; border-radius: 12px; width: 100%; max-width: 550px; box-shadow: 0 10px 30px rgba(0,0,0,0.6); border: 1px solid #7289da; }
        h2 { text-align: center; color: #7289da; text-transform: uppercase; letter-spacing: 2px; }
        label { display: block; margin-top: 15px; color: #b9bbbe; font-weight: bold; }
        input, textarea { width: 100%; padding: 12px; margin-top: 5px; border-radius: 6px; border: 1px solid #23272a; background-color: #40444b; color: white; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus, textarea:focus { border-color: #7289da; background-color: #484c52; }
        button { width: 100%; padding: 15px; margin-top: 25px; background-color: #7289da; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; text-transform: uppercase; }
        button:hover { background-color: #5b6eae; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
    </style>
</head>
<body>

<div class="form-container">
    <h2>REHBER BAŞVURU SİSTEMİ</h2>
    <form id="applyForm">
        <label>🎮 Minecraft Kullanıcı Adın:</label>
        <input type="text" id="user" required placeholder="Örn: Ege63">

        <label>🎂 Yaşın:</label>
        <input type="number" id="age" required>

        <label>⏰ Günlük Aktiflik Süren:</label>
        <input type="text" id="active" required placeholder="Örn: 4-5 Saat">

        <label>📜 Komut Bilgin (%):</label>
        <input type="number" id="commands" required placeholder="0-100 arası">

        <label>📝 Neden seni rehber olarak seçmeliyiz?</label>
        <textarea id="special" rows="4" required placeholder="Kendinden bahset patron..."></textarea>

        <button type="submit" id="submitBtn">BAŞVURUYU DİSCONS'A GÖNDER</button>
    </form>
</div>

<script>
    document.getElementById('applyForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "GÖNDERİLİYOR...";

        const webhookUrl = "https://discord.com/api/webhooks/1493294402863370285/sUkFCrya88cw7n3g3WB1v7q6bialujkkUY4qBJD50I7QK4wAqmTwTqhy2CMfJ9mIz3xO";

        const payload = {
            embeds: [{
                title: "📩 YENİ REHBER BAŞVURUSU!",
                color: 5814783, // Minecraft/Discord uyumlu yeşilimsi mavi
                fields: [
                    { name: "👤 Oyuncu", value: "`" + document.getElementById('user').value + "`", inline: true },
                    { name: "📅 Yaş", value: "`" + document.getElementById('age').value + "`", inline: true },
                    { name: "⚡ Komut Bilgisi", value: "`%" + document.getElementById('commands').value + "`", inline: true },
                    { name: "⏳ Aktiflik", value: "`" + document.getElementById('active').value + "`", inline: false },
                    { name: "📖 Açıklama", value: document.getElementById('special').value }
                ],
                footer: { text: "Ege Sunucu Başvuru Logu" },
                timestamp: new Date()
            }]
        };

        fetch(webhookUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).then(() => {
            alert('Başvuru başarıyla Discord kanalına iletildi patron!');
            document.getElementById('applyForm').reset();
            btn.disabled = false;
            btn.innerText = "BAŞVURUYU DİSCONS'A GÖNDER";
        }).catch(err => {
            alert('Hata oluştu! Discord Webhook bağlantısını kontrol et.');
            btn.disabled = false;
            btn.innerText = "TEKRAR DENE";
        });
    });
</script>

</body>
</html>
